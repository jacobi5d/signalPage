name: Action Network Data Scraper

on:
  schedule:
    # Runs every day at 10:00 UTC (Adjust as needed)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        env:
          AN_SESSION_TOKEN: ${{ secrets.AN_SESSION_TOKEN }}
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pro_report.json pro_report.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update: Latest PRO Report data"
          git push
